<!DOCTYPE html>
<html>
<head>
    <title>Test Telegram Bot</title>
</head>
<body>
    <h1>Test Telegram Bot</h1>
    <button onclick="testTelegram()">Send Test Message</button>
    <div id="result"></div>

    <script>
        async function testTelegram() {
            const botToken = '8886521882:AAG7Z1ndAg_l8rqwzMAb76ff35Sj4kWWtjk';
            const chatId = '5831003572';
            
            const message = `🧪 Test Message\n\nThis is a test from the Telegram bot.\nTime: ${new Date().toLocaleString()}`;
            
            document.getElementById('result').innerHTML = 'Sending...';
            
            try {
                const response = await fetch(
                    `https://api.telegram.org/bot${botToken}/sendMessage`,
                    {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                        },
                        body: JSON.stringify({
                            chat_id: chatId,
                            text: message,
                        }),
                    }
                );
                
                const data = await response.json();
                console.log('Response:', data);
                
                if (data.ok) {
                    document.getElementById('result').innerHTML = '✅ Message sent successfully!';
                } else {
                    document.getElementById('result').innerHTML = '❌ Error: ' + JSON.stringify(data);
                }
            } catch (error) {
                console.error('Error:', error);
                document.getElementById('result').innerHTML = '❌ Error: ' + error.message;
            }
        }
    </script>
</body>
</html>
